<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeevan Setu — Bridge of Life</title>
    <meta name="description" content="Jeevan Setu: Connecting survivors, responders, and donors in real-time disaster intelligence and emergency response." />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="cursor-glow"></div>
    <div id="toast-container"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const glow = document.getElementById('cursor-glow');
      if (glow) {
        document.addEventListener('mousemove', e => {
          glow.style.left = e.clientX + 'px';
          glow.style.top = e.clientY + 'px';
        });
      }
      document.addEventListener('click', e => {
        const btn = e.target.closest('.btn, .nav-item, .home-card, .stat-card');
        if (!btn) return;
        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height) * 2;
        const x = e.clientX - rect.left - size / 2;
        const y = e.clientY - rect.top - size / 2;
        const ripple = document.createElement('span');
        ripple.className = 'ripple-circle';
        ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
        btn.style.position = btn.style.position || 'relative';
        btn.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    </script>
  </body>
</html>
